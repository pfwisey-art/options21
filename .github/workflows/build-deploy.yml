name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build site
        run: PORT=3000 BASE_PATH=/ pnpm --filter @workspace/options21 run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Diagnose FTP directory structure
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp://${{ secrets.FTP_HOST }};
            echo '=== FTP root (pwd) ===';
            pwd;
            echo '=== FTP root (ls) ===';
            ls;
            echo '=== public_html contents ===';
            ls public_html/;
            bye
          "

      - name: Deploy via FTP
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp://${{ secrets.FTP_HOST }};
            mirror --reverse --verbose --no-perms --exclude .git ./artifacts/options21/dist/public/ public_html/;
            bye
          "
