name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build site
        run: PORT=3000 BASE_PATH=/ pnpm --filter @workspace/options21 run build

      - name: Copy cPanel deployment config into build output
        run: cp .cpanel.yml artifacts/options21/dist/public/.cpanel.yml

      - name: Push built files to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifacts/options21/dist/public
          publish_branch: deploy
          force_orphan: true
          commit_message: 'deploy: ${{ github.sha }}'
